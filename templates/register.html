<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="container">
    <h2>📝 Регистрация</h2>
    <form method="POST">
        <div class="form-group"><label for="login">Логин</label><input type="text" id="login" name="login" required><div class="error-msg"></div></div>
        <div class="form-group"><label for="password">Пароль</label><input type="password" id="password" name="password" required><div class="error-msg"></div></div>
        <div class="form-group"><label for="full_name">ФИО</label><input type="text" id="full_name" name="full_name" required><div class="error-msg"></div></div>
        <div class="form-group"><label for="phone">Телефон</label><input type="text" id="phone" name="phone" required placeholder="8(XXX)XXX-XX-XX"><div class="error-msg"></div></div>
        <div class="form-group"><label for="email">Email</label><input type="email" id="email" name="email" required><div class="error-msg"></div></div>
        <button type="submit" class="btn">Зарегистрироваться</button>
    </form>
    <p style="margin-top:16px;"><a href="/login">Уже есть аккаунт? Войти</a></p>
</div>
<script defer src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
